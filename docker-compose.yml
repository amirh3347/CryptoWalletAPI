services:

  db:
    container_name: db
    image: postgres:17.8-alpine
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${PGDB_NAME}
      POSTGRES_USER: ${PGDB_USER}
      POSTGRES_PASSWORD: ${PGDB_PASS}
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $PGDB_USER -d $PGDB_NAME']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:8.0.6-alpine
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: backend
    volumes:
      - ./core:/usr/src/app
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
     build:
       context: .
       dockerfile: dockerfiles/Dockerfile
     entrypoint: celery -A core worker --loglevel=info
     container_name: celery_worker
     volumes:
       - ./core:/usr/src/app
     env_file: .env
     restart: always
     depends_on:
       db:
         condition: service_healthy
       redis:
         condition: service_healthy
